runtime: python311

entrypoint: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT

env_variables:
  GEMINI_API_KEY: "REPLACE_WITH_YOUR_KEY"
  TWITTER_BEARER_TOKEN: ""
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USER: ""
  SMTP_PASS: ""

automatic_scaling:
  min_instances: 1
  max_instances: 3
